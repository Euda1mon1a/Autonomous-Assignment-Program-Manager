[pytest]
***REMOVED*** Pytest configuration for Residency Scheduler backend

***REMOVED*** Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

***REMOVED*** Minimum version required
minversion = 7.0

***REMOVED*** Output settings
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

***REMOVED*** Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    acgme: marks tests related to ACGME compliance
    performance: marks tests as performance/load tests

***REMOVED*** Asyncio mode for async tests
asyncio_mode = auto

***REMOVED*** Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

***REMOVED*** Coverage settings (if pytest-cov is installed)
***REMOVED*** Run with: pytest --cov=app --cov-report=html
