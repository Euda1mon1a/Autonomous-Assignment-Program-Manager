[pytest]
# Pytest configuration for Residency Scheduler backend

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version required
minversion = 7.0

# Output settings
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    acgme: marks tests related to ACGME compliance
    performance: marks tests as performance/load tests
    resilience: marks tests for resilience framework
    e2e: marks tests as end-to-end tests requiring full stack
    requires_db: marks tests requiring PostgreSQL database
    requires_redis: marks tests requiring Redis
    requires_celery: marks tests requiring Celery worker

# Asyncio mode for async tests
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage settings (if pytest-cov is installed)
# Run with: pytest --cov=app --cov-report=html
