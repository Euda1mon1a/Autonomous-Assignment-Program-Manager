***REMOVED*** =============================================================================
***REMOVED*** Load Testing Configuration - Residency Scheduler
***REMOVED*** =============================================================================
***REMOVED*** Enhanced connection pooling, relaxed rate limits, and monitoring for
***REMOVED*** authorized load testing. Maintains security while enabling performance testing.
***REMOVED*** =============================================================================
***REMOVED***
***REMOVED*** SECURITY NOTICE:
***REMOVED*** - Load testing is restricted to whitelisted IPs and requires secret key
***REMOVED*** - Replace YOUR_LOAD_TEST_SECRET_KEY with actual secret before deployment
***REMOVED*** - Never expose load test endpoints to public internet
***REMOVED*** - Monitor load test logs for unauthorized access attempts
***REMOVED***
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Load Test Authentication - Header-Based Activation
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Detects legitimate load testing via X-Load-Test-Key header
***REMOVED*** Usage: Include header in load test requests: "X-Load-Test-Key: YOUR_SECRET"
map $http_x_load_test_key $load_test_mode {
    default 0;
    ***REMOVED*** SECURITY: Replace with actual secret key (min 32 chars)
    ***REMOVED*** Generate with: python -c 'import secrets; print(secrets.token_urlsafe(32))'
    "YOUR_LOAD_TEST_SECRET_KEY" 1;
}

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** IP Whitelist for Load Testing
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Restrict load testing to trusted networks only
***REMOVED*** Prevents external abuse of relaxed rate limits
geo $load_test_whitelist {
    default 0;

    ***REMOVED*** Localhost
    127.0.0.1/32 1;
    ::1/128 1;

    ***REMOVED*** Docker networks (default Docker bridge and user-defined networks)
    172.16.0.0/12 1;

    ***REMOVED*** Common private networks
    10.0.0.0/8 1;          ***REMOVED*** Class A private network
    192.168.0.0/16 1;      ***REMOVED*** Class C private network

    ***REMOVED*** Add CI/CD server IPs here:
    ***REMOVED*** 203.0.113.0/24 1;    ***REMOVED*** Example: Jenkins/GitLab CI runners
    ***REMOVED*** 198.51.100.50/32 1;  ***REMOVED*** Example: Specific load testing server
}

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enhanced Rate Limiting Zones for Load Testing
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Relaxed limits for authorized load testing while preventing abuse

***REMOVED*** Load test API rate limit - 100 requests/second per IP
***REMOVED*** 100x more permissive than normal API rate limit (30r/s)
limit_req_zone $binary_remote_addr zone=loadtest_api:10m rate=100r/s;

***REMOVED*** Load test schedule generation - 10 requests/minute per IP
***REMOVED*** 100x more permissive than normal schedule gen (1r/10s)
limit_req_zone $binary_remote_addr zone=loadtest_schedule:10m rate=10r/m;

***REMOVED*** Load test general endpoints - 50 requests/second per IP
***REMOVED*** 5x more permissive than normal general rate (10r/s)
limit_req_zone $binary_remote_addr zone=loadtest_general:10m rate=50r/s;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enhanced Upstream for Load Testing
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Dedicated upstream pool with aggressive connection reuse
***REMOVED*** Optimized for high-throughput load testing scenarios
upstream backend_loadtest {
    ***REMOVED*** Use least connections for even load distribution
    least_conn;

    ***REMOVED*** Primary backend server (same as production)
    server backend:8000 weight=5 max_fails=5 fail_timeout=10s;

    ***REMOVED*** Add additional backend servers for horizontal scaling during load tests:
    ***REMOVED*** server backend-2:8000 weight=5 max_fails=5 fail_timeout=10s;
    ***REMOVED*** server backend-3:8000 weight=5 max_fails=5 fail_timeout=10s;

    ***REMOVED*** ENHANCED CONNECTION POOLING
    ***REMOVED*** Keep 100 idle connections ready (vs 32 in normal upstream)
    keepalive 100;

    ***REMOVED*** Allow 10,000 requests per connection before closing (vs 1,000 normal)
    ***REMOVED*** Reduces connection overhead for high-volume testing
    keepalive_requests 10000;

    ***REMOVED*** Keep connections alive for 60 seconds
    keepalive_timeout 60s;
}

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Detailed Logging Format for Load Test Analysis
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Captures timing metrics essential for performance analysis
***REMOVED*** Compatible with load testing tools (K6, JMeter, Locust, etc.)
log_format loadtest escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"request_protocol":"$server_protocol",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_load_test_key":"$http_x_load_test_key",'
        '"load_test_mode":"$load_test_mode",'
        '"connection":"$connection",'
        '"connection_requests":"$connection_requests"'
    '}';

