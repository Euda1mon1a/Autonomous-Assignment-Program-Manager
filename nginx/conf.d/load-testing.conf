***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** EXAMPLE 2: Load Test API Endpoints (Relaxed Rate Limits)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Add this location block to default.conf for dedicated load testing routes
***REMOVED***
***REMOVED*** location /api/loadtest/ {
***REMOVED***     ***REMOVED*** SECURITY: Require both whitelisted IP AND valid load test key
***REMOVED***     if ($load_test_whitelist = 0) {
***REMOVED***         return 403 '{"error":"Load testing not allowed from this IP"}';
***REMOVED***     }
***REMOVED***
***REMOVED***     if ($load_test_mode = 0) {
***REMOVED***         return 403 '{"error":"Valid X-Load-Test-Key header required"}';
***REMOVED***     }
***REMOVED***
***REMOVED***     ***REMOVED*** Relaxed rate limiting for load tests
***REMOVED***     limit_req zone=loadtest_api burst=200 nodelay;
***REMOVED***     limit_conn conn_limit 50;
***REMOVED***
***REMOVED***     ***REMOVED*** Use enhanced upstream with connection pooling
***REMOVED***     proxy_pass http://backend_loadtest;
***REMOVED***     include /etc/nginx/snippets/proxy-params.conf;
***REMOVED***
***REMOVED***     ***REMOVED*** ENHANCED TIMEOUTS for load testing
***REMOVED***     proxy_connect_timeout 60s;
***REMOVED***     proxy_send_timeout 300s;
***REMOVED***     proxy_read_timeout 300s;
***REMOVED***
***REMOVED***     ***REMOVED*** ENHANCED BUFFERS for high throughput
***REMOVED***     proxy_buffer_size 128k;
***REMOVED***     proxy_buffers 4 256k;
***REMOVED***     proxy_busy_buffers_size 256k;
***REMOVED***
***REMOVED***     ***REMOVED*** Detailed logging for analysis
***REMOVED***     access_log /var/log/nginx/loadtest.log loadtest;
***REMOVED***
***REMOVED***     ***REMOVED*** Add load test identifier to response
***REMOVED***     add_header X-Load-Test-Mode "active" always;
***REMOVED*** }

