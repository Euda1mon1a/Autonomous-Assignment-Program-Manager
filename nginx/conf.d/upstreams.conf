***REMOVED*** Upstream Definitions - Load Balancing Configuration
***REMOVED*** =============================================================================
***REMOVED*** Define upstream server groups for load balancing and high availability.
***REMOVED*** Each upstream can have multiple servers with health checks.
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Backend API Servers (FastAPI)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Load balancing strategy: least_conn (sends to server with fewest connections)
***REMOVED*** Add more backend servers for horizontal scaling
upstream backend_servers {
    ***REMOVED*** Load balancing method - use least connections for API workloads
    least_conn;

    ***REMOVED*** Primary backend server
    server backend:8000 weight=5 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Add additional backend servers for scaling:
    ***REMOVED*** server backend-2:8000 weight=5 max_fails=3 fail_timeout=30s;
    ***REMOVED*** server backend-3:8000 weight=5 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Keep connections alive to upstream servers
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Frontend Servers (Next.js)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Load balancing strategy: round_robin (default) for frontend servers
upstream frontend_servers {
    ***REMOVED*** Primary frontend server
    server frontend:3000 weight=5 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Add additional frontend servers for scaling:
    ***REMOVED*** server frontend-2:3000 weight=5 max_fails=3 fail_timeout=30s;
    ***REMOVED*** server frontend-3:3000 weight=5 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Keep connections alive
    keepalive 16;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** WebSocket Upstream (for real-time features)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Separate upstream for WebSocket connections with IP hash for sticky sessions
upstream websocket_servers {
    ***REMOVED*** Use IP hash for sticky sessions (WebSocket requires persistence)
    ip_hash;

    ***REMOVED*** Backend WebSocket endpoint
    server backend:8000 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Add additional WebSocket servers:
    ***REMOVED*** server backend-2:8000 max_fails=3 fail_timeout=30s;

    ***REMOVED*** Longer keepalive for WebSocket connections
    keepalive 64;
    keepalive_timeout 120s;
}
