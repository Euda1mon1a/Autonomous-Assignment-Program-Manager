***REMOVED*** =============================================================================
***REMOVED*** SSL/TLS Configuration Parameters
***REMOVED*** =============================================================================
***REMOVED*** Modern SSL configuration based on Mozilla's recommendations.
***REMOVED*** Security Level: Intermediate (supports most browsers from 2013+)
***REMOVED*** Reference: https://ssl-config.mozilla.org/
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** SSL Protocol & Ciphers
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** TLS 1.2 and 1.3 only (TLS 1.0 and 1.1 are deprecated)
ssl_protocols TLSv1.2 TLSv1.3;

***REMOVED*** Prefer server cipher order
ssl_prefer_server_ciphers off;

***REMOVED*** Modern cipher suite (compatible with TLS 1.2+)
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** SSL Session Configuration
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Session cache - shared cache of 10MB (approximately 40,000 sessions)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

***REMOVED*** Session tickets (for session resumption)
ssl_session_tickets off;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Diffie-Hellman Parameters
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 4096
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

***REMOVED*** ECDH curve selection
ssl_ecdh_curve secp384r1;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** OCSP Stapling
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Improve SSL handshake performance by stapling OCSP responses
ssl_stapling on;
ssl_stapling_verify on;

***REMOVED*** DNS resolver for OCSP (use Google DNS or your preferred resolver)
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

***REMOVED*** Trusted certificate for OCSP verification
***REMOVED*** This should point to the CA certificate chain
ssl_trusted_certificate /etc/nginx/ssl/live/residency-scheduler.example.com/chain.pem;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** HTTP Strict Transport Security (HSTS)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enable HSTS with a 2-year max-age
***REMOVED*** WARNING: Only enable after confirming HTTPS works correctly
***REMOVED*** add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
