***REMOVED*** =============================================================================
***REMOVED*** Security Headers Configuration
***REMOVED*** =============================================================================
***REMOVED*** Comprehensive security headers to protect against common web vulnerabilities.
***REMOVED*** Reference: https://securityheaders.com/
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** HTTP Strict Transport Security (HSTS)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Force HTTPS for 2 years, including subdomains
***REMOVED*** Add 'preload' only when ready for browser preload lists
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Content Security Policy (CSP)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Strict CSP to prevent XSS and other injection attacks
***REMOVED*** Adjust based on your application's requirements
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https:;
    font-src 'self' data:;
    connect-src 'self' wss: https:;
    frame-ancestors 'self';
    form-action 'self';
    base-uri 'self';
    object-src 'none';
    upgrade-insecure-requests;
" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** X-Frame-Options
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Prevent clickjacking by not allowing site to be framed
add_header X-Frame-Options "SAMEORIGIN" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** X-Content-Type-Options
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** X-XSS-Protection
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enable browser's built-in XSS filter (legacy, but still useful)
add_header X-XSS-Protection "1; mode=block" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Referrer-Policy
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Control referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Permissions-Policy (formerly Feature-Policy)
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Control browser features and APIs
add_header Permissions-Policy "
    accelerometer=(),
    camera=(),
    geolocation=(),
    gyroscope=(),
    magnetometer=(),
    microphone=(),
    payment=(),
    usb=(),
    interest-cohort=()
" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cross-Origin Headers
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cross-Origin Embedder Policy
add_header Cross-Origin-Embedder-Policy "require-corp" always;

***REMOVED*** Cross-Origin Opener Policy
add_header Cross-Origin-Opener-Policy "same-origin" always;

***REMOVED*** Cross-Origin Resource Policy
add_header Cross-Origin-Resource-Policy "same-origin" always;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cache-Control for HTML
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Prevent caching of sensitive data
***REMOVED*** This is overridden for static assets in static-cache.conf
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;
