***REMOVED*** =============================================================================
***REMOVED*** Static File Caching Configuration
***REMOVED*** =============================================================================
***REMOVED*** Aggressive caching configuration for static assets to improve performance.
***REMOVED*** Used for immutable assets like JS bundles, CSS, images, and fonts.
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cache-Control Headers
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cache static assets for 1 year (assets should use cache-busting URLs)
add_header Cache-Control "public, max-age=31536000, immutable" always;

***REMOVED*** Remove security headers that conflict with caching
***REMOVED*** These are re-added for dynamic content in security-headers.conf
proxy_hide_header Cache-Control;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Gzip Configuration
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enable gzip for static assets
gzip_static on;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** File Handling
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enable sendfile for efficient file serving
sendfile on;
tcp_nopush on;
tcp_nodelay on;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** ETag and Last-Modified
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Enable ETag for cache validation
etag on;

***REMOVED*** Enable Last-Modified header
if_modified_since before;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Logging
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Reduce logging for static assets
access_log off;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Error Handling
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Custom 404 handling for missing static files
***REMOVED*** Falls back to the frontend application
***REMOVED*** try_files $uri @frontend;
