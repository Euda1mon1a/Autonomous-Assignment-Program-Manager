***REMOVED*** =============================================================================
***REMOVED*** Proxy Parameters Configuration
***REMOVED*** =============================================================================
***REMOVED*** Standard proxy settings for forwarding requests to upstream servers.
***REMOVED*** Preserves client information and handles connection properly.
***REMOVED*** =============================================================================

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Proxy Headers
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Forward original host header
proxy_set_header Host $host;

***REMOVED*** Forward real client IP address
proxy_set_header X-Real-IP $remote_addr;

***REMOVED*** Append to X-Forwarded-For chain
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

***REMOVED*** Forward protocol (http/https)
proxy_set_header X-Forwarded-Proto $scheme;

***REMOVED*** Forward original port
proxy_set_header X-Forwarded-Port $server_port;

***REMOVED*** Forward request ID for tracing (if present)
proxy_set_header X-Request-ID $request_id;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Proxy Behavior
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** HTTP version for upstream connections
proxy_http_version 1.1;

***REMOVED*** Remove Connection header for keepalive
proxy_set_header Connection "";

***REMOVED*** Enable buffering for better performance
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 16k;
proxy_busy_buffers_size 24k;

***REMOVED*** Temporary file settings
proxy_max_temp_file_size 0;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Proxy Timeouts
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Connection timeout to upstream
proxy_connect_timeout 60s;

***REMOVED*** Read timeout from upstream
proxy_read_timeout 60s;

***REMOVED*** Send timeout to upstream
proxy_send_timeout 60s;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Error Handling
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Don't pass upstream errors to client
proxy_intercept_errors off;

***REMOVED*** Retry on specific errors
proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
proxy_next_upstream_timeout 10s;
proxy_next_upstream_tries 3;

***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Cache Headers
***REMOVED*** -----------------------------------------------------------------------------
***REMOVED*** Hide upstream server information
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

***REMOVED*** Pass cache headers
proxy_pass_header Cache-Control;
proxy_pass_header Expires;
