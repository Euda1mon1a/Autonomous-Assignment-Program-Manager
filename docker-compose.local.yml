
***REMOVED*** =============================================================================
***REMOVED*** LOCAL DEVELOPMENT Docker Compose Configuration
***REMOVED*** =============================================================================
***REMOVED*** This file uses standard Docker Hub images (no authentication required)
***REMOVED*** and is optimized for local development with hot-reload and exposed ports
***REMOVED***
***REMOVED*** USAGE:
***REMOVED***   docker-compose -f docker-compose.local.yml up --build
***REMOVED***   docker-compose -f docker-compose.local.yml down
***REMOVED***   docker-compose -f docker-compose.local.yml logs -f backend
***REMOVED***
***REMOVED*** FIRST TIME SETUP:
***REMOVED***   1. Copy .env.local.example (see bottom of file) to .env.local
***REMOVED***   2. Run: docker-compose -f docker-compose.local.yml up --build
***REMOVED***   3. Access:
***REMOVED***      - Frontend: http://localhost:3000
***REMOVED***      - Backend API: http://localhost:8000
***REMOVED***      - API Docs: http://localhost:8000/docs
***REMOVED***      - PostgreSQL: localhost:5432
***REMOVED***      - Redis: localhost:6379
***REMOVED***      - n8n: http://localhost:5678
***REMOVED***
***REMOVED*** HOT RELOAD:
***REMOVED***   - Backend: Source code is mounted as volume, uvicorn auto-reloads
***REMOVED***   - Frontend: Source code is mounted, Next.js dev server auto-reloads
***REMOVED***
***REMOVED*** =============================================================================

services:
  ***REMOVED*** ===========================================================================
  ***REMOVED*** PostgreSQL Database
  ***REMOVED*** ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: scheduler-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: residency_scheduler
    ports:
      - "5432:5432"  ***REMOVED*** Exposed for direct DB access (e.g., pgAdmin, DBeaver)
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d residency_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  ***REMOVED*** ===========================================================================
  ***REMOVED*** Redis - Message Broker & Cache
  ***REMOVED*** ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: scheduler-local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"  ***REMOVED*** Exposed for debugging with redis-cli or RedisInsight
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass local_dev_redis_pass
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local_dev_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  ***REMOVED*** ===========================================================================
  ***REMOVED*** FastAPI Backend (Development Mode with Hot Reload)
  ***REMOVED*** ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: scheduler-local-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ***REMOVED*** Database
      DATABASE_URL: postgresql://scheduler:local_dev_password@db:5432/residency_scheduler

      ***REMOVED*** Redis
      REDIS_PASSWORD: local_dev_redis_pass
      REDIS_URL: redis://:local_dev_redis_pass@redis:6379/0

      ***REMOVED*** Celery
      CELERY_BROKER_URL: redis://:local_dev_redis_pass@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:local_dev_redis_pass@redis:6379/0

      ***REMOVED*** Security (DEV ONLY - generate proper secrets for production)
      SECRET_KEY: local_dev_secret_key_not_for_production_use_only_12345678901234567890

      ***REMOVED*** Development settings
      DEBUG: "true"
      ENVIRONMENT: development

      ***REMOVED*** CORS
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'

      ***REMOVED*** Logging
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"  ***REMOVED*** FastAPI server
      - "5678:5678"  ***REMOVED*** Optional: debugpy remote debugging (if configured)
    volumes:
      ***REMOVED*** Mount source code for hot reload
      - ./backend:/app
      ***REMOVED*** Don't override these directories
      - /app/__pycache__
      - /app/.pytest_cache
      - backend_local_venv:/app/venv
    networks:
      - app-network
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI development server with hot reload...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  ***REMOVED*** ===========================================================================
  ***REMOVED*** Celery Worker (Background Tasks)
  ***REMOVED*** ===========================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: scheduler-local-celery-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://scheduler:local_dev_password@db:5432/residency_scheduler
      REDIS_PASSWORD: local_dev_redis_pass
      REDIS_URL: redis://:local_dev_redis_pass@redis:6379/0
      CELERY_BROKER_URL: redis://:local_dev_redis_pass@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:local_dev_redis_pass@redis:6379/0
      SECRET_KEY: local_dev_secret_key_not_for_production_use_only_12345678901234567890
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - backend_local_venv:/app/venv
    networks:
      - app-network
    command: celery -A app.core.celery_app worker --loglevel=debug -Q default,resilience,notifications
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ***REMOVED*** ===========================================================================
  ***REMOVED*** Celery Beat Scheduler (Periodic Tasks)
  ***REMOVED*** ===========================================================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: scheduler-local-celery-beat
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://scheduler:local_dev_password@db:5432/residency_scheduler
      REDIS_PASSWORD: local_dev_redis_pass
      REDIS_URL: redis://:local_dev_redis_pass@redis:6379/0
      CELERY_BROKER_URL: redis://:local_dev_redis_pass@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:local_dev_redis_pass@redis:6379/0
      SECRET_KEY: local_dev_secret_key_not_for_production_use_only_12345678901234567890
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - backend_local_venv:/app/venv
    networks:
      - app-network
    command: celery -A app.core.celery_app beat --loglevel=debug

  ***REMOVED*** ===========================================================================
  ***REMOVED*** Next.js Frontend (Development Mode with Hot Reload)
  ***REMOVED*** ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: scheduler-local-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ***REMOVED*** Backend API URL
      NEXT_PUBLIC_API_URL: http://localhost:8000

      ***REMOVED*** Development settings
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1

      ***REMOVED*** Enable hot reload
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"  ***REMOVED*** Next.js dev server
    volumes:
      ***REMOVED*** Mount source code for hot reload
      - ./frontend:/app
      ***REMOVED*** Don't override these directories
      - /app/node_modules
      - /app/.next
    networks:
      - app-network
    command: npm run dev

  ***REMOVED*** ===========================================================================
  ***REMOVED*** n8n - Workflow Automation (Optional)
  ***REMOVED*** ===========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: scheduler-local-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"  ***REMOVED*** Changed to 5679 to avoid conflict with backend debugpy
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=local_dev_n8n_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679
      - GENERIC_TIMEZONE=America/New_York
      - N8N_LOG_LEVEL=debug
    volumes:
      - n8n_local_data:/home/node/.n8n
    networks:
      - app-network

***REMOVED*** =============================================================================
***REMOVED*** Volumes - Local Development Data
***REMOVED*** =============================================================================
volumes:
  postgres_local_data:
    driver: local
  redis_local_data:
    driver: local
  n8n_local_data:
    driver: local
  backend_local_venv:
    driver: local

***REMOVED*** =============================================================================
***REMOVED*** Networks
***REMOVED*** =============================================================================
networks:
  app-network:
    driver: bridge

