***REMOVED*** =============================================================================
***REMOVED*** Nginx Server Configuration for Residency Scheduler
***REMOVED*** =============================================================================
***REMOVED*** Production server block with API proxying and security
***REMOVED*** =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    ***REMOVED*** Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Health Check Endpoint
    ***REMOVED*** ==========================================================================

    location /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Nginx Status (for monitoring)
    ***REMOVED*** ==========================================================================

    location /nginx_status {
        stub_status on;
        access_log off;
        ***REMOVED*** Only allow from internal networks (adjust as needed)
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** API Proxy to Backend
    ***REMOVED*** ==========================================================================

    location /api/ {
        ***REMOVED*** Rate limiting
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 10;

        ***REMOVED*** Proxy settings
        proxy_pass http://backend/;
        proxy_http_version 1.1;

        ***REMOVED*** Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        ***REMOVED*** WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        ***REMOVED*** Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        ***REMOVED*** Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        ***REMOVED*** Error handling
        proxy_intercept_errors off;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Authentication Endpoints (stricter rate limiting)
    ***REMOVED*** ==========================================================================

    location /api/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_conn conn 5;

        proxy_pass http://backend/auth/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Static Assets (Next.js)
    ***REMOVED*** ==========================================================================

    ***REMOVED*** Next.js static files with long cache
    location /_next/static/ {
        alias /usr/share/nginx/html/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    ***REMOVED*** Public static files
    location /public/ {
        alias /usr/share/nginx/html/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    ***REMOVED*** Favicon
    location = /favicon.ico {
        try_files $uri /public/favicon.ico;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    ***REMOVED*** Robots.txt
    location = /robots.txt {
        try_files $uri /public/robots.txt;
        access_log off;
        log_not_found off;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Security: Block sensitive files
    ***REMOVED*** ==========================================================================

    ***REMOVED*** Block dotfiles (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    ***REMOVED*** Block access to sensitive extensions
    location ~* \.(git|env|log|bak|old|sql|conf|config)$ {
        deny all;
        return 404;
    }

    ***REMOVED*** Block common backup files
    location ~* ~$ {
        deny all;
        return 404;
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Next.js Application (SPA fallback)
    ***REMOVED*** ==========================================================================

    location / {
        ***REMOVED*** Try static files first, then fall back to index.html
        try_files $uri $uri.html $uri/ /index.html;

        ***REMOVED*** Security headers for HTML pages
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        ***REMOVED*** Cache control for HTML (short or no cache)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    ***REMOVED*** ==========================================================================
    ***REMOVED*** Error Pages
    ***REMOVED*** ==========================================================================

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
