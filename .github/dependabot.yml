***REMOVED*** Dependabot Configuration
***REMOVED*** SECURITY ALERTS ONLY - no automatic version bumps
***REMOVED***
***REMOVED*** LESSON LEARNED: Automatic updates broke production:
***REMOVED*** - Python 3.12→3.14 broke OR-Tools (no wheel)
***REMOVED*** - Tailwind v4 broke CSS syntax
***REMOVED*** - React ecosystem updates need manual testing
***REMOVED***
***REMOVED*** Manual updates preferred - we control the timing.

version: 2
updates:
  ***REMOVED*** Python - security only
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "daily"  ***REMOVED*** Check daily for security
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "python"
    commit-message:
      prefix: "security(backend)"
    ***REMOVED*** Only create PRs for security updates
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  ***REMOVED*** NPM - security only
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "javascript"
    commit-message:
      prefix: "security(frontend)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  ***REMOVED*** GitHub Actions - security only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    labels:
      - "security"
      - "ci-cd"
    commit-message:
      prefix: "security(ci)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  ***REMOVED*** Docker - disabled (manual only)
  ***REMOVED*** Python base image updates have broken builds twice
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"  ***REMOVED*** Rarely check
    open-pull-requests-limit: 0  ***REMOVED*** Never open PRs
    labels:
      - "docker"
    ignore:
      - dependency-name: "*"
