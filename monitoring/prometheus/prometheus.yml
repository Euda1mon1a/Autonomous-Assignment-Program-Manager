***REMOVED*** Prometheus Configuration
***REMOVED*** Residency Scheduler Monitoring Stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'residency-scheduler'
    environment: '${ENVIRONMENT:-production}'

***REMOVED*** Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

***REMOVED*** Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/rules/*.yml

***REMOVED*** Scrape configurations
scrape_configs:
  ***REMOVED*** Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 10s

  ***REMOVED*** FastAPI Backend Application
  - job_name: 'residency-scheduler-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  ***REMOVED*** Backend Health Check
  - job_name: 'backend-health'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /health
    scrape_interval: 30s
    scrape_timeout: 10s

  ***REMOVED*** PostgreSQL Database Metrics (via postgres_exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    scrape_timeout: 15s

  ***REMOVED*** Node Exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  ***REMOVED*** Container metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  ***REMOVED*** Redis metrics (if using Redis for caching)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  ***REMOVED*** Nginx metrics (if using nginx)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 15s

  ***REMOVED*** Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
    scrape_interval: 30s

  ***REMOVED*** Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    metrics_path: /metrics
    scrape_interval: 30s
