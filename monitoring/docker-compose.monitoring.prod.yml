***REMOVED*** SECURITY: This file removes all external port mappings for monitoring services.
***REMOVED*** In production, monitoring services should only be accessible via internal networks,
***REMOVED*** not exposed to the host or external networks.
***REMOVED***
***REMOVED*** Usage:
***REMOVED***   docker-compose -f docker-compose.monitoring.yml -f docker-compose.monitoring.prod.yml up -d
***REMOVED***
***REMOVED*** Rationale:
***REMOVED***   - Prometheus, Grafana, and other monitoring tools should not be publicly accessible
***REMOVED***   - Reduces attack surface by eliminating unnecessary port exposure
***REMOVED***   - Monitoring data may contain sensitive information about system internals
***REMOVED***   - Access should be controlled via reverse proxy with authentication
***REMOVED***
***REMOVED*** Access in Production:
***REMOVED***   - Set up an authenticated reverse proxy (nginx/traefik) to Grafana
***REMOVED***   - Use SSH tunneling for direct admin access: ssh -L 3001:localhost:3001 user@server
***REMOVED***   - VPN access to internal network for monitoring tools

