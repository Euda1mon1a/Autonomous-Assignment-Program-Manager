repos:
  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 1: Security Scanning (First Line of Defense)
  ***REMOVED*** ============================================================================

  ***REMOVED*** PII/OPSEC/PERSEC scanning (medical residency context)
  - repo: local
    hooks:
      - id: pii-scan
        name: PII/OPSEC scanner (military medical data)
        entry: scripts/pii-scan.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  ***REMOVED*** Secret detection - prevent accidentally committing credentials
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: Gitleaks - Detect secrets
        entry: gitleaks detect --verbose --source git --log-level info
        language: golang
        stages: [pre-commit, commit-msg]
        pass_filenames: false

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 2: Python Backend Quality (Ruff)
  ***REMOVED*** ============================================================================

  ***REMOVED*** Ruff linting - fast, comprehensive Python linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      ***REMOVED*** Linting with fixes applied
      - id: ruff
        name: ruff lint
        args: [--config, backend/pyproject.toml, --fix, --exit-zero]
        files: ^backend/
        stages: [pre-commit]

      ***REMOVED*** Code formatting
      - id: ruff-format
        name: ruff format
        args: [--config, backend/pyproject.toml]
        files: ^backend/
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 3: Python Type Checking (MyPy)
  ***REMOVED*** ============================================================================

  ***REMOVED*** Type checking - optional but recommended
  - repo: local
    hooks:
      - id: mypy
        name: mypy (type check)
        entry: bash -c "cd backend && mypy app/ --ignore-missing-imports --no-error-summary 2>/dev/null || true"
        language: system
        pass_filenames: false
        files: ^backend/app/
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 4: General File Quality
  ***REMOVED*** ============================================================================

  ***REMOVED*** Check for merge conflict markers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      ***REMOVED*** Detect merge conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
        stages: [pre-commit]

      ***REMOVED*** Ensure files end with newline
      - id: end-of-file-fixer
        name: End of file fixer
        stages: [pre-commit]

      ***REMOVED*** Detect large files
      - id: check-added-large-files
        name: Check for added large files
        args: ['--maxkb=1000']
        stages: [pre-commit]

      ***REMOVED*** Check YAML syntax
      - id: check-yaml
        name: Check YAML syntax
        args: [--unsafe]
        stages: [pre-commit]

      ***REMOVED*** Check JSON syntax
      - id: check-json
        name: Check JSON syntax
        stages: [pre-commit]

      ***REMOVED*** Check for debugger statements in Python
      - id: debug-statements
        name: Check for debugger statements
        stages: [pre-commit]

      ***REMOVED*** Check for executable scripts
      - id: check-executables-have-shebangs
        name: Check executables have shebangs
        stages: [pre-commit]

      ***REMOVED*** Trim trailing whitespace
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-template]
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 5: Python Security (Bandit)
  ***REMOVED*** ============================================================================

  ***REMOVED*** Bandit - Python security linter
  - repo: local
    hooks:
      - id: bandit
        name: bandit (Python security)
        entry: bash -c "cd backend && bandit -r app -ll 2>/dev/null || true"
        language: system
        pass_filenames: false
        files: ^backend/app/
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 6: Frontend TypeScript/JavaScript Quality
  ***REMOVED*** ============================================================================

  ***REMOVED*** Frontend linting via npm scripts
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend linting)
        entry: bash -c "cd frontend && npm run lint:fix 2>/dev/null || true"
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 7: Frontend Type Checking
  ***REMOVED*** ============================================================================

  ***REMOVED*** TypeScript type checking
  - repo: local
    hooks:
      - id: tsc
        name: tsc (TypeScript type check)
        entry: bash -c "cd frontend && npm run type-check 2>/dev/null || true"
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 8: Commit Message Validation
  ***REMOVED*** ============================================================================

  ***REMOVED*** Conventional commits - enforce commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.12.0
    hooks:
      - id: commitizen
        name: Conventional commit format
        entry: cz check
        stages: [commit-msg]
        language: python

  ***REMOVED*** ============================================================================
  ***REMOVED*** PHASE 9: YAML Validation
  ***REMOVED*** ============================================================================

  ***REMOVED*** YAML linting for GitHub Actions and configs
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: YAML lint
        args: ['--config-data', '{extends: relaxed, rules: {line-length: {max: 120}}}']
        files: ^\.github/workflows/.*\.ya?ml$
        stages: [pre-commit]

  ***REMOVED*** ============================================================================
  ***REMOVED*** Configuration
  ***REMOVED*** ============================================================================

ci:
  autofix_commit_msg: 'chore(pre-commit): auto-fix pre-commit hooks'
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore(pre-commit): auto-update hooks'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
